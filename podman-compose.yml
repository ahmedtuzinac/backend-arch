version: "3.9"

services:
  # --- Infrastructure ---
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      websocket:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Services ---
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    env_file: services/auth/.env
    ports:
      - "8001:8001"
    volumes:
      - ./services/auth/app:/app/app:ro
      - ./packages/core-shared/core_shared:/usr/local/lib/python3.13/site-packages/core_shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  auth-worker:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    command: arq app.workers.settings.WorkerSettings
    env_file: services/auth/.env
    volumes:
      - ./services/auth/app:/app/app:ro
      - ./packages/core-shared/core_shared:/usr/local/lib/python3.13/site-packages/core_shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  websocket:
    build:
      context: .
      dockerfile: services/websocket/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    env_file: services/websocket/.env
    ports:
      - "8003:8002"
    volumes:
      - ./services/websocket/app:/app/app:ro
      - ./packages/core-shared/core_shared:/usr/local/lib/python3.13/site-packages/core_shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      auth:
        condition: service_healthy
    restart: unless-stopped

  files:
    build:
      context: .
      dockerfile: services/files/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload
    env_file: services/files/.env
    ports:
      - "8005:8005"
    volumes:
      - ./services/files/app:/app/app:ro
      - ./packages/core-shared/core_shared:/usr/local/lib/python3.13/site-packages/core_shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  files-worker:
    build:
      context: .
      dockerfile: services/files/Dockerfile
    command: arq app.workers.settings.WorkerSettings
    env_file: services/files/.env
    volumes:
      - ./services/files/app:/app/app:ro
      - ./packages/core-shared/core_shared:/usr/local/lib/python3.13/site-packages/core_shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
